version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: blog_backend
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: blog_frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - backend